name = "shriram-review"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# The exact origin your live site is served from (CORS lock). For GitHub Pages
# this is typically "https://OWNER.github.io". Use "*" only while testing.
ALLOW_ORIGIN = "https://thisisshon.github.io"

# Per-team reviewer keys (Team + Key login). Any of these values authenticates a
# reviewer; the team picked in the dropdown is a label. These are LOW-VALUE UAT
# passwords kept in-repo for simplicity — rotate/remove before real production, or
# move to `wrangler secret put TEAM_KEYS` if you want them out of git.
TEAM_KEYS = '{"Product":"product2026","SEO":"seo2026","Marketing":"marketing2026","Content":"content2026"}'

# Optional config gate: JSON array of the teams allowed to authenticate / be read.
# Leave UNSET to enable every team (the default). Phase 1 runs Content + the Builder/Admin
# role only; the other teams stay in TEAM_KEYS but are gated off here (a disabled team's
# key, and any team-scoped read for it, gets a 403). The Builder/Admin role (ADMIN_PASS)
# is never gated. Re-enable a team by adding it here (keep in sync with TEAM_ENABLED in
# core/config.js, which drives the UI greying).
ENABLED_TEAMS = '["Content"]'

# KV store for comments. Create it once with:
#   wrangler kv namespace create COMMENTS
# then paste the printed id below.
[[kv_namespaces]]
binding = "COMMENTS"
# Reuses the existing COMMENTS store so prior tickets are preserved (records are backward-compatible).
id = "324f355edd5e4c71b29d3e5e7424d9f5"

# Workers AI - generates the developer-ready change prompt for each entry.
[ai]
binding = "AI"

# --- AI change-prompt provider (pluggable, all optional) ---
# Override the Workers AI model:
#   AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# OR switch to Anthropic (Claude) by setting the secret
#   wrangler secret put ANTHROPIC_API_KEY
# and optionally the model:
#   ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"

# Admin dashboard password — a secret, NOT stored here. Set it once with:
#   wrangler secret put ADMIN_PASS       # dashboard admin (read all, resolve/close, delete)
# (REVIEW_PASS is the old single shared reviewer key — still honoured as a fallback,
#  but TEAM_KEYS above replaces it. Set it only if you want one shared key too.)
