<!doctype html>
<!-- Proofkit dashboard — STANDALONE entry for non-Astro hosts. Framework-neutral:
     just open this file (or serve it). It loads ./dashboard.css + ./dashboard.js from core/.
     The Astro build uses ../Dashboard.astro instead; both share this core. -->
<html lang="en" data-pk-theme="red-moon">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Content Review Dashboard</title>
<style>html,body{margin:0;background:#141414}body{font-family:Outfit,system-ui,-apple-system,sans-serif}</style>
<link rel="stylesheet" href="./design/tokens.css">
<link rel="stylesheet" href="./design/components.css">
<link rel="stylesheet" href="./dashboard.css">
</head>
<body>
<!-- Non-Astro host: set your Cloudflare Worker URL below (empty string = localStorage demo). -->
<script>window.PROOFKIT_WORKER_URL='';</script>
<section class="rvd">
  <div class="rvd-app" data-enter>
    <!-- Brand top bar -->
    <header class="rvd-top">
      <div class="rvd-brand">
        <svg class="rvd-mark" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-4 4V5Z" fill="#da291c"/>
          <circle cx="12" cy="9.5" r="1.6" fill="#fff"/>
        </svg>
        <span class="rvd-word">ProofKit</span>
        <span class="rvd-tag">Content Review | Shriram FS</span>
      </div>
      <div class="rvd-actions">
        <a class="rvd-btn rvd-btn-primary" href="/">Go to site</a>
        <button id="rvd-refresh" class="rvd-btn" type="button">
          <span class="rvd-refresh-ico">
            <svg class="ico-sync" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
            <svg class="ico-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <span class="rvd-refresh-label">Refresh</span>
        </button>
      </div>
    </header>

    <!-- Headline -->
    <div class="rvd-headband">
      <div class="rvd-headband-row">
        <h1 class="rvd-h1">Review and Bug Testing</h1>
        <span class="rvd-headtoggle" data-pk-toggle></span>
      </div>
      <p class="rvd-lead">Every comment left across the site. Open a pin to see it in
        context on the live page; resolve items here as you action them.</p>
    </div>

    <!-- Stat tiles -->
    <div class="rvd-bar">
      <div class="rvd-counts" id="rvd-counts"></div>
    </div>

    <div class="rvd-shell">
      <aside class="rvd-side">
        <button class="rvd-nav is-active" data-view="dash">Overview</button>
        <button class="rvd-nav" data-view="deploy">Deploy<span class="rvd-navbadge" id="rvd-badge-deploy" hidden>0</span></button>
        <button class="rvd-nav" data-view="notifs">Notifications<span class="rvd-navbadge rvd-navbadge-alert" id="rvd-badge-notifs" hidden>0</span></button>
        <button class="rvd-nav" data-view="entries">Master Log</button>
      </aside>

      <div class="rvd-content">
        <!-- Dashboard View: all current info -->
        <div id="rvd-view-dash">
          <div class="rvd-toolbar" id="rvd-toolbar">
            <input id="rvd-search" class="rvd-search" type="search" placeholder="Search comments, pages, reviewers…" autocomplete="off" spellcheck="false" />
            <div id="rvd-sort-mount"></div>
            <span class="rvd-toolbar-sp"></span>
            <div id="rvd-copy-mount"></div>
          </div>
          <div class="rvd-tabs" id="rvd-tabs" role="tablist">
            <button class="rvd-tab is-active" data-tab="all">All</button>
            <button class="rvd-tab" data-tab="page">By Page</button>
            <button class="rvd-tab" data-tab="open">Open</button>
            <button class="rvd-tab" data-tab="bucket">In Bucket</button>
            <button class="rvd-tab" data-tab="deployed">Deployed</button>
            <button class="rvd-tab" data-tab="closed">Closed</button>
          </div>
          <div class="rvd-teamchips" id="rvd-teamchips"></div>
          <div id="rvd-list"></div>
        </div>

        <!-- Deploy Bucket: completed/closed comments awaiting publish -->
        <div id="rvd-view-deploy" hidden></div>

        <!-- Notifications: fired on Deploy, newest first -->
        <div id="rvd-view-notifs" hidden></div>

        <!-- Master Log: tabular log (one row per change) + per-entry detail drill-in -->
        <div id="rvd-view-entries" hidden>
          <div id="rvd-entries"></div>
        </div>

        <p id="rvd-empty" class="rvd-empty" hidden>No comments yet.</p>
      </div>
    </div>

    <!-- bulk-select action bar (shows when ≥1 comment is selected) -->
    <div class="rvd-bulk" id="rvd-bulk" hidden>
      <span class="rvd-bulk-n" id="rvd-bulk-n">0 selected</span>
      <button class="rvd-bulk-a" type="button" data-act="complete">Mark Complete</button>
      <button class="rvd-bulk-a" type="button" data-act="reopen">Reopen</button>
      <button class="rvd-bulk-a" type="button" data-act="close">Close</button>
      <button class="rvd-bulk-a" type="button" data-act="copy">Copy prompts</button>
      <button class="rvd-bulk-a danger" type="button" data-act="delete">Delete</button>
      <button class="rvd-bulk-x" type="button" id="rvd-bulk-clear" aria-label="Clear selection">×</button>
    </div>
  </div>
</section>
<script type="module" src="./dashboard.js"></script>
</body>
</html>
