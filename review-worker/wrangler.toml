name = "shriram-review"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# The exact origin your live site is served from (CORS lock). For GitHub Pages
# this is typically "https://OWNER.github.io". Use "*" only while testing.
ALLOW_ORIGIN = "https://OWNER.github.io"

# KV store for comments. Create it once with:
#   wrangler kv namespace create COMMENTS
# then paste the printed id below.
[[kv_namespaces]]
binding = "COMMENTS"
id = "PASTE_KV_NAMESPACE_ID_HERE"

# The passcode is a secret, NOT stored here. Set it once with:
#   wrangler secret put REVIEW_PASS
